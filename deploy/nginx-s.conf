# poly-sentient Kalshi sidecar — fronted by cloudflared:
#   s.wersdfwer.com (CF tunnel) -> nginx :8080 (this vhost) -> sidecar 127.0.0.1:4320
map $http_upgrade $connection_upgrade_s { default upgrade; '' close; }

server {
    listen 8080;
    server_name s.wersdfwer.com;

    # SSE (/events) + JSON API + status page. Buffering off so SSE streams live.
    location / {
        proxy_pass http://127.0.0.1:4320;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
    }
}
